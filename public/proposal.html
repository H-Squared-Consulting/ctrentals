  // ── Show error ──
  function showError(type) {
    var titles = {
      missing_ref: 'Missing Reference',
      not_found: 'Proposal Not Found',
      expired: 'Proposal Expired',
      error: 'Something Went Wrong'
    };
    var messages = {
      missing_ref: 'No proposal reference was provided. Please check the link you were sent and try again.',

      expired: 'This proposal has expired. Please contact us for an updated proposal.',
      error: 'We encountered an issue loading your proposal. Please try again later or contact us directly.'
    };
    el('loading-screen').style.display = 'none';
    var errEl = el('error-screen');
    errEl.style.display = 'flex';
    errEl.innerHTML =
      '<div class="err-title">' + esc(titles[type] || titles.error) + '</div>' +
      '<div class="err-msg">' + esc(messages[type] || messages.error) + '</div>';
  }

  // ── Show toast ──
  function showToast(msg) {
    var t = el('toast');
    t.textContent = msg;
    t.classList.add('visible');
    setTimeout(function() { t.classList.remove('visible'); }, 2600);
  }

  // ── Scroll progress ──
  window.addEventListener('scroll', function() {
    var h = document.documentElement.scrollHeight - window.innerHeight;
    var pct = h > 0 ? (window.scrollY / h) * 100 : 0;
    el('scroll-progress').style.width = pct + '%';
  });

  // ── Intersection Observer for reveal ──
  function initReveal() {
    var items = document.querySelectorAll('.reveal');
    if (!('IntersectionObserver' in window)) {
      items.forEach(function(el) { el.classList.add('visible'); });
      return;
    }
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    items.forEach(function(el) { observer.observe(el); });
  }

  // ── Supabase fetch helper ──
  function sbGet(path) {
    return fetch(SUPABASE_URL + '/rest/v1/' + path, { headers: headers(false) })
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      });
  }

  function sbPatch(path, body) {
    return fetch(SUPABASE_URL + '/rest/v1/' + path, {
      method: 'PATCH',
      headers: headers(true),
      body: JSON.stringify(body)
    });
  }

  // ── Build the page ──
  function render(proposal, property) {
    var p = proposal;
    var pr = property;

    // Parse JSON arrays safely
    var gallery = pr.gallery_images;
    if (typeof gallery === 'string') { try { gallery = JSON.parse(gallery); } catch(e) { gallery = []; } }
    if (!Array.isArray(gallery)) gallery = [];

    var amenities = pr.amenity_tags;
    if (typeof amenities === 'string') { try { amenities = JSON.parse(amenities); } catch(e) { amenities = []; } }
    if (!Array.isArray(amenities)) amenities = [];

    var links = pr.listing_links;
    if (typeof links === 'string') { try { links = JSON.parse(links); } catch(e) { links = []; } }
    if (!Array.isArray(links)) links = [];

    var nights = nightsBetween(p.check_in, p.check_out);
    var currency = pr.price_currency || 'ZAR';
    var currencySymbol = currency === 'ZAR' ? 'R' : currency + ' ';

    var locationParts = [pr.suburb, pr.city, pr.province].filter(Boolean);

    var html = '';

    // Section 1 - HERO
    html += '<section class="pos-hero">';
    if (pr.hero_image_url) {
      html += '<img class="pos-hero-img" src="' + esc(pr.hero_image_url) + '" alt="' + esc(pr.property_name) + '">';
    }
    html += '<div class="pos-hero-overlay"></div>';
    html += '<div class="pos-hero-content">';
    html += '<div class="pos-hero-brand">CT Rentals</div>';
    html += '<h1 class="pos-hero-title">' + esc(pr.property_name) + '</h1>';
    html += '</div>';
    html += '</section>';

    // Section 2 - PERSONAL GREETING
    html += '<section class="pos-greeting reveal">';
    html += '<div class="pos-greeting-meta">Prepared ' + esc(fmtDate(p.created_at)) + ' &nbsp;|&nbsp; Ref: ' + esc(p.ref_code) + '</div>';
    html += '<div class="pos-greeting-rule"></div>';
    html += '<div class="pos-greeting-dear">Dear ' + esc(p.guest_name) + ',</div>';
    html += '<p class="pos-greeting-body">We\'ve selected this property based on your requirements for ' +
      esc(p.guests_total) + ' guest' + (p.guests_total != 1 ? 's' : '') + ', ' +
      esc(fmtDateShort(p.check_in)) + ' to ' + esc(fmtDateShort(p.check_out)) + '.</p>';
    if (p.notes) {
      html += '<div class="pos-greeting-notes">' + esc(p.notes) + '</div>';
    }
    html += '</section>';

    // Section 3 - PROPERTY OVERVIEW
    html += '<section class="pos-overview reveal">';
    html += '<h2 class="pos-overview-name">' + esc(pr.property_name) + '</h2>';
    if (pr.tagline) {
      html += '<div class="pos-overview-tagline">' + esc(pr.tagline) + '</div>';
    }
    if (pr.description) {
      html += '<p class="pos-overview-desc">' + esc(pr.description) + '</p>';
    }
    html += '<div class="pos-stats-grid">';
    html += '<div class="pos-stat-card"><div class="pos-stat-value">' + esc(pr.bedrooms != null ? pr.bedrooms : '-') + '</div><div class="pos-stat-label">Bedrooms</div></div>';
    html += '<div class="pos-stat-card"><div class="pos-stat-value">' + esc(pr.bathrooms != null ? pr.bathrooms : '-') + '</div><div class="pos-stat-label">Bathrooms</div></div>';
    html += '<div class="pos-stat-card"><div class="pos-stat-value">' + esc(pr.sleeps != null ? pr.sleeps : '-') + '</div><div class="pos-stat-label">Sleeps</div></div>';
    html += '<div class="pos-stat-card"><div class="pos-stat-value" style="font-size:16px;">' + esc([pr.suburb, pr.city].filter(Boolean).join(', ') || '-') + '</div><div class="pos-stat-label">Location</div></div>';
    html += '</div>';
    html += '</section>';

    // Section 4 - GALLERY
    if (gallery.length > 0) {
      html += '<section class="pos-gallery reveal">';
      html += '<h2 class="pos-gallery-heading">Gallery</h2>';
      html += '<div class="pos-gallery-scroll">';
      for (var i = 0; i < gallery.length; i++) {
        html += '<img class="pos-gallery-img" src="' + esc(gallery[i]) + '" alt="' + esc(pr.property_name) + ' gallery image ' + (i + 1) + '" loading="lazy">';
      }
      html += '</div>';
      html += '</section>';
    }

    // Section 5 - AMENITIES
    if (amenities.length > 0) {
      html += '<section class="pos-amenities reveal">';
      html += '<h2 class="pos-amenities-heading">What\'s Included</h2>';
      html += '<ul class="pos-amenities-list">';
      for (var j = 0; j < amenities.length; j++) {
        html += '<li class="pos-feature-line">' + esc(amenities[j]) + '</li>';
      }
      html += '</ul>';
      html += '</section>';
    }

    // Section 6 - PRICING
    html += '<section class="pos-pricing reveal">';
    html += '<h2 class="pos-pricing-heading">Your Stay</h2>';
    html += '<div class="pos-pricing-card">';
    html += '<div class="pos-pricing-row"><span class="pos-pricing-label">Check-in</span><span class="pos-pricing-value">' + esc(fmtDate(p.check_in)) + '</span></div>';
    html += '<div class="pos-pricing-row"><span class="pos-pricing-label">Check-out</span><span class="pos-pricing-value">' + esc(fmtDate(p.check_out)) + '</span></div>';
    html += '<div class="pos-pricing-row"><span class="pos-pricing-label">Duration</span><span class="pos-pricing-value">' + esc(nights) + ' night' + (nights != 1 ? 's' : '') + '</span></div>';
    html += '<div class="pos-pricing-row"><span class="pos-pricing-label">Guests</span><span class="pos-pricing-value">' + esc(p.guests_total) + ' total</span></div>';
    if (pr.price_from) {
      html += '<div class="pos-pricing-price">';
      html += '<div class="pos-pricing-amount">From ' + esc(currencySymbol) + esc(Number(pr.price_from).toLocaleString()) + '</div>';
      html += '<div class="pos-pricing-per">per week</div>';
      html += '</div>';
    }
    if (p.budget_min || p.budget_max) {
      html += '<div class="pos-pricing-budget">Your budget: R' + esc(Number(p.budget_min || 0).toLocaleString()) + ' &ndash; R' + esc(Number(p.budget_max || 0).toLocaleString()) + '</div>';
    }
    html += '</div>';
    html += '</section>';

    // Section 7 - LOCATION
    html += '<section class="pos-location reveal">';
    html += '<h2 class="pos-location-heading">Location</h2>';
    html += '<p class="pos-location-address">' + esc(locationParts.join(', ') || 'Location details available on request') + '</p>';
    html += '</section>';

    // Section 8 - NEXT STEPS
    html += '<section class="pos-steps reveal">';
    html += '<h2 class="pos-steps-heading">Next Steps</h2>';
    html += '<ol class="pos-steps-list">';
    var steps = [
      'Review this proposal',
      'Let us know if you\'re interested',
      'We\'ll confirm availability and send booking details',
      'Secure your stay'
    ];
    for (var s = 0; s < steps.length; s++) {
      html += '<li class="pos-step-item"><span class="pos-step-num">' + (s + 1) + '</span><span class="pos-step-text">' + esc(steps[s]) + '</span></li>';
    }
    html += '</ol>';
    html += '</section>';

    // Section 9 - CTA
    var alreadyInterested = (p.status === 'interested');
    html += '<section class="pos-cta reveal">';
    html += '<h2 class="pos-cta-heading">Interested in ' + esc(pr.property_name) + '?</h2>';
    html += '<div class="pos-cta-buttons">';
    html += '<button id="btn-interested" class="pos-btn-interested"' + (alreadyInterested ? ' disabled' : '') + '>' +
      (alreadyInterested ? 'Interest Registered' : 'I\'m Interested') + '</button>';
    html += '<button id="btn-share" class="pos-btn-share">Share Proposal</button>';
    html += '</div>';
    html += '</section>';

    // Section 10 - CONTACT
    html += '<section class="pos-contact reveal">';
    html += '<h2 class="pos-contact-heading">Get in Touch</h2>';
    html += '<div class="pos-contact-links">';
    html += '<a href="tel:+27218130813" class="pos-contact-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>+27 21 813 0813</a>';
    html += '<a href="mailto:info@ctrentals.co.za" class="pos-contact-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>info@ctrentals.co.za</a>';
    html += '<a href="https://wa.me/27218130813" target="_blank" rel="noopener" class="pos-contact-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>WhatsApp</a>';
    html += '</div>';
    html += '</section>';

    // Section 11 - FOOTER
    html += '<footer class="pos-footer reveal">';
    html += '<div class="pos-footer-brand">CT Rentals</div>';
    html += '<div class="pos-footer-tagline">Cape Town Holiday Rentals</div>';
    html += '<div class="pos-footer-copy">&copy; ' + new Date().getFullYear() + ' CT Rentals. All rights reserved.</div>';
    html += '</footer>';

    // Inject into canvas
    var canvas = el('canvas');
    canvas.innerHTML = html;

    // Hide loading, show canvas
    el('loading-screen').style.display = 'none';
    canvas.style.display = 'block';

    // Init reveal animations
    initReveal();

    // ── Button: I'm Interested ──
    var btnInterested = el('btn-interested');
    if (btnInterested && !alreadyInterested) {
      btnInterested.addEventListener('click', function() {
        btnInterested.disabled = true;
        btnInterested.textContent = 'Interest Registered';
        sbPatch('proposals?ref_code=eq.' + encodeURIComponent(p.ref_code), {
          status: 'interested',
          accepted_at: new Date().toISOString()
        }).catch(function() {
          // Silently handle — button stays disabled as visual confirmation
        });
      });
    }

    // ── Button: Share Proposal ──
    var btnShare = el('btn-share');
    if (btnShare) {
      btnShare.addEventListener('click', function() {
        var url = window.location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(function() {
            showToast('Link copied to clipboard');
          }).catch(function() {
            fallbackCopy(url);
          });
        } else {
          fallbackCopy(url);
        }
      });
    }

    function fallbackCopy(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        showToast('Link copied to clipboard');
      } catch(e) {
        showToast('Could not copy link');
      }
      document.body.removeChild(ta);
    }
  }

  // ── Main init ──
  (function init() {
    var params = new URLSearchParams(window.location.search);
    var ref = params.get('ref');

    if (!ref) {
      showError('missing_ref');
      return;
    }

    var encodedRef = encodeURIComponent(ref);

    // Step 1: Fetch proposal
    sbGet('proposals?ref_code=eq.' + encodedRef + '&select=*&limit=1')
      .then(function(proposals) {
        if (!proposals || proposals.length === 0) {
          showError('not_found');
          return;
        }
        var proposal = proposals[0];

        // Check if expired (status)
        if (proposal.status === 'expired') {
          showError('expired');
          return;
        }

        // Step 2: Fetch property
        sbGet('partner_properties?id=eq.' + encodeURIComponent(proposal.property_id) + '&select=*&limit=1')
          .then(function(properties) {
            if (!properties || properties.length === 0) {
              showError('not_found');
              return;
            }
            var property = properties[0];

            // Step 3: Mark as viewed
            sbPatch('proposals?ref_code=eq.' + encodedRef, {
              viewed_at: new Date().toISOString()
            }).catch(function() {
              // Non-blocking — continue rendering
            });

            // Step 4: Render
            render(proposal, property);
          })
          .catch(function() {
            showError('error');
          });
      })
      .catch(function() {
        showError('error');
      });
  })();

})();
</script>
</body>
</html>
