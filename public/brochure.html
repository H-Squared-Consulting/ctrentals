  // ── Helpers ──
  function esc(str) {
    if (str == null) return '';
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(String(str)));
    return d.innerHTML;
  }

  function el(id) {
    return document.getElementById(id);
  }

  function showToast(msg) {
    var t = el('toast');
    t.textContent = msg;
    t.classList.add('visible');
    setTimeout(function() { t.classList.remove('visible'); }, 2500);
  }

  // ── Inject ALL CSS ──
  (function injectCSS() {
    var style = document.createElement('style');
    style.textContent = [

      '  --gold: #BD982F;',
      '  --gold-light: #d4b45a;',

      /* Loading screen */
      '#loading-screen {',

      '  display: flex; flex-direction: column; align-items: center; justify-content: center;',

      '.ls-spinner {',
      '  width: 48px; height: 48px; border: 3px solid rgba(189,152,47,0.2);',
      '  border-top-color: var(--gold); border-radius: 50%;',
      '  animation: spin 1s linear infinite;',
      '}',
      '.ls-text {',
      '  margin-top: 20px; color: var(--gold); font-size: 14px;',
      '  letter-spacing: 2px; text-transform: uppercase;',
      '}',
      '@keyframes spin { to { transform: rotate(360deg); } }',

      /* Error screen */
      '#error-screen {',
      '  position: fixed; inset: 0; z-index: 9998;',
      '  background: var(--black);',
      '  display: flex; flex-direction: column; align-items: center; justify-content: center;',

      '}',
      '.err-title { color: var(--gold); font-size: 24px; margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; }',
      '.err-msg { color: #999; font-size: 15px; max-width: 400px; line-height: 1.6; }',

      /* Scroll progress */
      '#scroll-progress {',
      '  position: fixed; top: 0; left: 0; width: 0%; height: 3px;',
      '  background: var(--gold); z-index: 10000; transition: width 0.1s linear;',
      '}',

      /* Page wrapper */
      '#canvas {',
      '  max-width: 820px; margin: 0 auto; background: var(--white);',
      '  overflow: hidden;',
      '}',
      '@media (min-width: 1024px) {',
      '  #canvas { margin-top: 2.5rem; margin-bottom: 2.5rem; border-radius: 4px;',
      '    box-shadow: 0 8px 40px rgba(0,0,0,0.12); }',
      '}',

      /* Toast */
      '#toast {',
      '  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);',
      '  background: var(--text-dark); color: var(--white); padding: 12px 28px;',

      '  opacity: 0; transition: opacity 0.3s, transform 0.3s;',

      '}',
      '#toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }',

      /* Reveal animation */
      '.reveal {',
      '  opacity: 0; transform: translateY(24px);',
      '  transition: opacity 0.7s ease, transform 0.7s ease;',
      '}',
      '.reveal.visible { opacity: 1; transform: translateY(0); }',

      /* ── Section 1: HERO ── */
      '.br-hero {',
      '  position: relative; min-height: 500px; overflow: hidden;',
      '  display: flex; flex-direction: column; justify-content: flex-end;',
      '  padding: 48px 40px;',
      '}',
      '.br-hero-img {',
      '  position: absolute; inset: 0; width: 100%; height: 100%;',
      '  object-fit: cover;',
      '}',
      '.br-hero-overlay {',
      '  position: absolute; inset: 0;',
      '  background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);',
      '}',
      '.br-hero-content { position: relative; z-index: 1; }',
      '.br-hero-brand {',
      '  color: var(--gold); font-size: 12px; letter-spacing: 3px;',

      '}',
      '.br-hero-title {',
      '  color: var(--white); font-size: 38px; line-height: 1.2;',
      '  background: linear-gradient(90deg, var(--white) 0%, var(--white) 40%, var(--gold-light) 50%, var(--white) 60%, var(--white) 100%);',
      '  background-size: 200% 100%;',
      '  -webkit-background-clip: text; background-clip: text;',
      '  -webkit-text-fill-color: transparent;',
      '  animation: shimmer 6s linear infinite;',
      '}',
      '.br-hero-tagline {',
      '  color: rgba(255,255,255,0.85); font-size: 16px; font-style: italic;',
      '  margin-top: 12px;',
      '}',
      '@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }',
      '@media (max-width: 767px) {',
      '  .br-hero { min-height: 380px; padding: 32px 24px; }',
      '  .br-hero-title { font-size: 28px; }',
      '  .br-hero-tagline { font-size: 14px; }',
      '}',

      /* ── Section 2: KEY STATS ── */
      '.br-stats { background: var(--white); padding: 48px 40px; text-align: center; }',
      '.br-stats-row {',
      '  display: flex; justify-content: center; gap: 32px; flex-wrap: wrap;',
      '  margin-bottom: 24px;',
      '}',
      '.br-stat-card {',
      '  min-width: 100px; padding: 16px 24px;',
      '}',
      '.br-stat-value { font-size: 36px; color: var(--gold); line-height: 1.2; }',
      '.br-stat-label {',
      '  font-size: 11px; color: var(--text-light); text-transform: uppercase;',
      '  letter-spacing: 1.5px; margin-top: 6px;',
      '}',
      '.br-stats-location {',
      '  font-size: 15px; color: var(--text-mid); letter-spacing: 0.5px;',
      '}',
      '@media (max-width: 767px) {',
      '  .br-stats { padding: 32px 24px; }',
      '  .br-stats-row { gap: 16px; }',
      '  .br-stat-card { min-width: 80px; padding: 12px 16px; }',
      '  .br-stat-value { font-size: 28px; }',
      '}',

      /* ── Section 3: ABOUT ── */
      '.br-about { background: var(--linen); padding: 48px 40px; }',
      '.br-about-heading {',
      '  font-size: 22px; color: var(--text-dark); margin-bottom: 8px;',
      '}',
      '.br-about-rule {',
      '  width: 60px; height: 2px; background: var(--gold); margin-bottom: 24px;',
      '}',
      '.br-about-text { color: var(--text-mid); font-size: 15px; line-height: 1.8; }',
      '.br-about-text p { margin-bottom: 16px; }',
      '.br-about-text p:last-child { margin-bottom: 0; }',
      '@media (max-width: 767px) {',
      '  .br-about { padding: 32px 24px; }',
      '}',

      /* ── Section 4: GALLERY ── */
      '.br-gallery { background: var(--white); padding: 48px 40px; }',
      '.br-gallery-heading {',
      '  font-size: 22px; color: var(--text-dark); margin-bottom: 8px;',
      '}',
      '.br-gallery-rule {',
      '  width: 60px; height: 2px; background: var(--gold); margin-bottom: 24px;',
      '}',
      '.br-gallery-grid {',
      '  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;',
      '}',
      '.br-gallery-grid img {',
      '  width: 100%; height: 260px; object-fit: cover; border-radius: 8px;',
      '  transition: transform 0.3s ease; cursor: pointer;',
      '}',
      '.br-gallery-grid img:hover { transform: scale(1.02); }',
      '.br-gallery-grid img.br-gallery-full {',
      '  grid-column: 1 / -1; height: 360px;',
      '}',
      '@media (max-width: 767px) {',
      '  .br-gallery { padding: 32px 24px; }',
      '  .br-gallery-grid { grid-template-columns: 1fr; }',
      '  .br-gallery-grid img { height: 220px; }',
      '  .br-gallery-grid img.br-gallery-full { grid-column: auto; height: 240px; }',
      '}',

      /* ── Section 5: AMENITIES ── */
      '.br-amenities { background: var(--linen); padding: 48px 40px; }',
      '.br-amenities-heading {',
      '  font-size: 22px; color: var(--text-dark); margin-bottom: 8px;',
      '}',
      '.br-amenities-rule {',
      '  width: 60px; height: 2px; background: var(--gold); margin-bottom: 24px;',
      '}',
      '.br-amenities-list {',
      '  list-style: none; columns: 2; column-gap: 32px;',
      '}',
      '.br-amenity-item {',
      '  padding: 8px 0; font-size: 15px; color: var(--text-mid);',
      '  break-inside: avoid; display: flex; align-items: center; gap: 10px;',
      '}',
      '.br-amenity-item::before {',
      '  content: ""; display: inline-block; width: 8px; height: 8px;',
      '  background: var(--gold); border-radius: 50%; flex-shrink: 0;',
      '}',
      '@media (max-width: 767px) {',
      '  .br-amenities { padding: 32px 24px; }',
      '  .br-amenities-list { columns: 1; }',
      '}',

      /* ── Section 6: PRICING ── */
      '.br-pricing { background: var(--white); padding: 48px 40px; text-align: center; }',
      '.br-pricing-heading {',
      '  font-size: 22px; color: var(--text-dark); margin-bottom: 8px;',
      '}',
      '.br-pricing-rule {',
      '  width: 60px; height: 2px; background: var(--gold); margin: 0 auto 32px;',
      '}',
      '.br-pricing-amount {',
      '  font-size: 32px; color: var(--gold); margin-bottom: 4px;',
      '}',
      '.br-pricing-per {',
      '  font-size: 13px; color: var(--text-light); margin-bottom: 32px;',
      '}',
      '.br-btn-primary {',
      '  position: relative; overflow: hidden;',
      '  display: inline-block; background: var(--gold); color: var(--black);',
      '  border: none; padding: 14px 40px; font-size: 15px; font-family: var(--font-body);',
      '  cursor: pointer; border-radius: 6px; letter-spacing: 1px;',
      '  text-transform: uppercase; text-decoration: none;',
      '  transition: background 0.3s;',
      '}',
      '.br-btn-primary:hover { background: var(--gold-light); }',
      '.br-btn-primary::after {',
      '  content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;',
      '  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);',
      '  transition: none;',
      '}',
      '.br-btn-primary:hover::after {',
      '  animation: btnShine 0.6s ease forwards;',
      '}',
      '@keyframes btnShine { to { left: 150%; } }',
      '.br-listing-links { margin-top: 16px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }',
      '.br-btn-outline {',
      '  display: inline-block; background: transparent; color: var(--gold);',
      '  border: 2px solid var(--gold); padding: 10px 28px; font-size: 13px;',
      '  font-family: var(--font-body); cursor: pointer; border-radius: 6px;',
      '  letter-spacing: 1px; text-transform: uppercase; text-decoration: none;',
      '  transition: background 0.3s, color 0.3s;',
      '}',
      '.br-btn-outline:hover { background: var(--gold); color: var(--black); }',
      '@media (max-width: 767px) {',
      '  .br-pricing { padding: 32px 24px; }',
      '  .br-pricing-amount { font-size: 26px; }',
      '}',

      /* ── Section 7: SHARE ── */
      '.br-share { background: var(--black); padding: 56px 40px; text-align: center; }',
      '.br-share-heading { color: var(--white); font-size: 24px; margin-bottom: 24px; }',
      '.br-share-sub {',
      '  color: #666; font-size: 13px; margin-top: 20px;',
      '}',
      '@media (max-width: 767px) {',
      '  .br-share { padding: 40px 24px; }',
      '  .br-share-heading { font-size: 20px; }',
      '}',

      /* ── Section 8: FOOTER ── */
      '.br-footer { background: var(--linen); padding: 40px; text-align: center; }',
      '.br-footer-brand {',
      '  color: var(--gold); font-size: 13px; letter-spacing: 3px;',
      '  text-transform: uppercase; margin-bottom: 6px;',
      '}',
      '.br-footer-tagline {',
      '  color: var(--text-mid); font-size: 14px; margin-bottom: 16px;',
      '}',
      '.br-footer-copy {',
      '  color: var(--text-light); font-size: 12px;',
      '}',
      '@media (max-width: 767px) {',
      '  .br-footer { padding: 32px 24px; }',
      '}'
    ].join('\n');
    document.head.appendChild(style);
  })();

  // ── Loading screen ──
  el('loading-screen').innerHTML =
    '<div class="ls-spinner"></div>' +
    '<div class="ls-text">Loading brochure</div>';

  // ── Error helper ──
  function showError(title, msg) {
    el('loading-screen').style.display = 'none';
    var e = el('error-screen');
    e.style.display = 'flex';
    e.innerHTML =
      '<div class="err-title">' + esc(title) + '</div>' +
      '<div class="err-msg">' + esc(msg) + '</div>';
  }

  // ── Scroll progress ──
  window.addEventListener('scroll', function() {
    var h = document.documentElement.scrollHeight - window.innerHeight;
    var pct = h > 0 ? (window.scrollY / h) * 100 : 0;
    el('scroll-progress').style.width = Math.min(pct, 100) + '%';
  });

  // ── Reveal on scroll ──
  function initReveal() {
    var reveals = document.querySelectorAll('.reveal');
    if (!reveals.length) return;
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    reveals.forEach(function(el) { observer.observe(el); });
  }

  // ── Currency symbol helper ──
  function currencySymbol(code) {
    if (!code) return 'R';
    var map = { ZAR: 'R', USD: '$', EUR: '\u20AC', GBP: '\u00A3' };
    return map[code.toUpperCase()] || code + ' ';
  }

  // ── Format price with commas ──
  function fmtPrice(n) {
    if (n == null) return '';
    return Number(n).toLocaleString('en-ZA');
  }

  // ── Parse JSON field (handles string or array) ──
  function parseJSON(val) {
    if (!val) return [];
    if (Array.isArray(val)) return val;
    try { return JSON.parse(val); } catch(e) { return []; }
  }

  // ── Build brochure HTML ──
  function renderBrochure(p) {
    var gallery = parseJSON(p.gallery_images);
    var amenities = parseJSON(p.amenity_tags);
    var listingLinks = parseJSON(p.listing_links);
    var html = '';

    // Section 1: HERO
    var heroImg = p.hero_image_url || (gallery.length ? gallery[0] : '');
    html += '<section class="br-hero">';
    if (heroImg) {
      html += '<img class="br-hero-img" src="' + esc(heroImg) + '" alt="' + esc(p.property_name) + '">';
    }
    html += '<div class="br-hero-overlay"></div>';
    html += '<div class="br-hero-content">';
    // No branding on brochures
    html += '<h1 class="br-hero-title">' + esc(p.property_name) + '</h1>';
    if (p.tagline) {
      html += '<div class="br-hero-tagline">' + esc(p.tagline) + '</div>';
    }
    html += '</div>';
    html += '</section>';

    // Section 2: KEY STATS
    var stats = [];
    if (p.bedrooms && p.bedrooms > 0) stats.push({ value: p.bedrooms, label: 'Bedrooms' });
    if (p.bathrooms && p.bathrooms > 0) stats.push({ value: p.bathrooms, label: 'Bathrooms' });
    if (p.sleeps && p.sleeps > 0) stats.push({ value: p.sleeps, label: 'Sleeps' });

    var locationParts = [];
    if (p.suburb) locationParts.push(p.suburb);
    if (p.city) locationParts.push(p.city);
    var locationStr = locationParts.join(', ');

    if (stats.length > 0 || locationStr) {
      html += '<section class="br-stats reveal">';
      if (stats.length > 0) {
        html += '<div class="br-stats-row">';
        for (var i = 0; i < stats.length; i++) {
          html += '<div class="br-stat-card">';
          html += '<div class="br-stat-value">' + esc(stats[i].value) + '</div>';
          html += '<div class="br-stat-label">' + esc(stats[i].label) + '</div>';
          html += '</div>';
        }
        html += '</div>';
      }
      if (locationStr) {
        html += '<div class="br-stats-location">' + esc(locationStr) + '</div>';
      }
      html += '</section>';
    }

    // Section 3: ABOUT
    if (p.description) {
      var descParagraphs = p.description.split(/\n\n|\n/).filter(function(s) { return s.trim(); });
      html += '<section class="br-about reveal">';
      html += '<h2 class="br-about-heading">About This Property</h2>';
      html += '<div class="br-about-rule"></div>';
      html += '<div class="br-about-text">';
      for (var j = 0; j < descParagraphs.length; j++) {
        html += '<p>' + esc(descParagraphs[j].trim()) + '</p>';
      }
      html += '</div>';
      html += '</section>';
    }

    // Section 4: GALLERY
    if (gallery.length > 0) {
      html += '<section class="br-gallery reveal">';
      html += '<h2 class="br-gallery-heading">Gallery</h2>';
      html += '<div class="br-gallery-rule"></div>';
      html += '<div class="br-gallery-grid">';
      for (var k = 0; k < gallery.length; k++) {
        var fullClass = k === 0 ? ' br-gallery-full' : '';
        html += '<img class="' + fullClass + '" src="' + esc(gallery[k]) + '" alt="' + esc(p.property_name) + ' - Photo ' + (k + 1) + '" loading="lazy">';
      }
      html += '</div>';
      html += '</section>';
    }

    // Section 5: AMENITIES
    if (amenities.length > 0) {
      html += '<section class="br-amenities reveal">';
      html += '<h2 class="br-amenities-heading">Amenities</h2>';
      html += '<div class="br-amenities-rule"></div>';
      html += '<ul class="br-amenities-list">';
      for (var m = 0; m < amenities.length; m++) {
        html += '<li class="br-amenity-item">' + esc(amenities[m]) + '</li>';
      }
      html += '</ul>';
      html += '</section>';
    }

    // Section 6: PRICING — removed (no pricing on brochures)

    // Section 7: SHARE
    html += '<section class="br-share reveal">';
    html += '<h2 class="br-share-heading">Share This Property</h2>';
    html += '<button class="br-btn-primary" id="btn-copy-link">Copy Link</button>';
    html += '<div class="br-share-sub">Share this brochure with anyone interested</div>';
    html += '</section>';

    // Section 8: FOOTER
    html += '<footer class="br-footer">';
    // No branding in footer
    // No tagline
    html += '<div class="br-footer-copy">&copy; ' + new Date().getFullYear() + ' All rights reserved.</div>';
    html += '</footer>';

    return html;
  }

  // ── Main ──
  (function main() {
    var params = new URLSearchParams(window.location.search);
    var id = params.get('id');

    if (!id) {
      showError('Missing Property ID', 'No property ID was provided. Please check the link and try again.');
      return;
    }

    var url = SUPABASE_URL + '/rest/v1/partner_properties?id=eq.' + encodeURIComponent(id) + '&select=*&limit=1';

    fetch(url, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      }
    })
    .then(function(res) {
      if (!res.ok) throw new Error('Failed to load property data');
      return res.json();
    })
    .then(function(data) {
      if (!data || data.length === 0) {
        showError('Property Not Found', 'The requested property could not be found. It may have been removed or the link may be incorrect.');
        return;
      }

      var p = data[0];

      // Set page title
      document.title = (p.property_name || 'Property Brochure');

      // Render brochure
      var canvas = el('canvas');
      canvas.innerHTML = renderBrochure(p);
      canvas.style.display = 'block';

      // Hide loading
      el('loading-screen').style.display = 'none';

      // Init reveal animations
      initReveal();

      // Copy link button
      var copyBtn = el('btn-copy-link');
      if (copyBtn) {
        copyBtn.addEventListener('click', function() {
          navigator.clipboard.writeText(window.location.href).then(function() {
            showToast('Link copied to clipboard');
          }).catch(function() {
            // Fallback for older browsers
            var ta = document.createElement('textarea');
            ta.value = window.location.href;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try {
              document.execCommand('copy');
              showToast('Link copied to clipboard');
            } catch(e) {
              showToast('Could not copy link');
            }
            document.body.removeChild(ta);
          });
        });
      }
    })
    .catch(function(err) {
      showError('Something Went Wrong', 'We could not load the property brochure. Please try again later.');
    });
  })();

})();
