  // ── Error helper ──
  function showError(title, msg) {
    el('loading-screen').style.display = 'none';
    var e = el('error-screen');
    e.style.display = 'flex';
    e.innerHTML =
      '<div class="err-title">' + esc(title) + '</div>' +
      '<div class="err-msg">' + esc(msg) + '</div>';
  }

  // ── Scroll progress ──
  window.addEventListener('scroll', function() {
    var h = document.documentElement.scrollHeight - window.innerHeight;
    var pct = h > 0 ? (window.scrollY / h) * 100 : 0;
    el('scroll-progress').style.width = Math.min(pct, 100) + '%';
  });

  // ── Reveal on scroll ──
  function initReveal() {
    var reveals = document.querySelectorAll('.reveal');
    if (!reveals.length) return;
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    reveals.forEach(function(el) { observer.observe(el); });
  }

  // ── Currency symbol helper ──
  function currencySymbol(code) {
    if (!code) return 'R';
    var map = { ZAR: 'R', USD: '$', EUR: '\u20AC', GBP: '\u00A3' };
    return map[code.toUpperCase()] || code + ' ';
  }

  // ── Format price with commas ──
  function fmtPrice(n) {
    if (n == null) return '';
    return Number(n).toLocaleString('en-ZA');
  }

  // ── Parse JSON field (handles string or array) ──
  function parseJSON(val) {
    if (!val) return [];
    if (Array.isArray(val)) return val;
    try { return JSON.parse(val); } catch(e) { return []; }
  }

  // Airbnb's muscache CDN serves the full original resolution when no size
  // hint is present in the URL. For a 100-photo gallery that's hundreds of
  // megabytes; the browser falls over before any image paints. Append a
  // reasonable width hint so the CDN returns a sensible size. Supabase
  // Storage URLs are left untouched — they're already correctly sized.
  function sizedImgUrl(url, w) {
    if (!url || typeof url !== 'string') return url;
    if (url.indexOf('muscache.com') === -1) return url;
    // Don't double-up if the URL already has a size hint.
    if (/[?&]im_w=/.test(url)) return url;
    var sep = url.indexOf('?') === -1 ? '?' : '&';
    return url + sep + 'im_w=' + w;
  }

  // Read image_metadata for a given URL. Missing entry == default (caption '',
  // show_in_brochure true) so untouched legacy properties behave as before.
  function imageMeta(meta, url) {
    if (!meta || typeof meta !== 'object') return { caption: '', show: true };
    var m = meta[url];
    if (!m || typeof m !== 'object') return { caption: '', show: true };
    return {
      caption: typeof m.caption === 'string' ? m.caption : '',
      show: m.show_in_brochure !== false,
    };
  }

  // Fill the gallery grid in RAF-paced batches. Large galleries (100+ photos)
  // were stalling the iframe paint when emitted inline — by streaming the
  // figures in after first paint, the rest of the brochure becomes visible
  // immediately while photos arrive incrementally.
  var GALLERY_BATCH_SIZE = 16;
  function fillGalleryChunked() {
    if (!window._brGalleryQueue) return;
    var queue = window._brGalleryQueue;
    var grid = document.getElementById('br-gallery-grid');
    if (!grid) return;
    var items = queue.items;
    var propertyName = queue.propertyName;
    var i = 0;
    var photoIdx = 0; // counts only photo items (for alt text + featured-slot)
    function step() {
      // Bail if a re-render swapped this grid out from under us (e.g. live preview).
      if (grid !== document.getElementById('br-gallery-grid')) return;
      var end = Math.min(i + GALLERY_BATCH_SIZE, items.length);
      var chunk = '';
      for (; i < end; i++) {
        var item = items[i];
        // Queue items can be either { heading } (section subtitle) or
        // { url, caption } (an actual photo).
        if (item && item.heading) {
          chunk += '<h3 class="br-gallery-subheading">' + esc(item.heading) + '</h3>';
          continue;
        }
        var figClass = 'br-gallery-fig' + (photoIdx === 0 ? ' br-gallery-full' : '');
        photoIdx++;
        chunk += '<figure class="' + figClass + '">';
        chunk += '<img src="' + esc(sizedImgUrl(item.url, 1200)) + '" alt="' + esc(propertyName) + ' - Photo ' + photoIdx + '" loading="lazy">';
        if (item.caption) {
          chunk += '<figcaption class="br-gallery-caption">' + esc(item.caption) + '</figcaption>';
        }
        chunk += '</figure>';
      }
      grid.insertAdjacentHTML('beforeend', chunk);
      if (i < items.length) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  // Parse brochure_config: { hidden_sections: [...], photo_order: [...] }.
  // Missing / null fields fall back to defaults — legacy rows render as before.
  function readBrochureConfig(cfg) {
    if (typeof cfg === 'string') { try { cfg = JSON.parse(cfg); } catch(e) { cfg = {}; } }
    if (!cfg || typeof cfg !== 'object' || Array.isArray(cfg)) cfg = {};
    var hidden = Array.isArray(cfg.hidden_sections) ? cfg.hidden_sections : [];
    var order  = Array.isArray(cfg.photo_order) ? cfg.photo_order : null;
    return {
      hide: function(name) { return hidden.indexOf(name) !== -1; },
      photoOrder: order,
    };
  }

  // ── Build brochure HTML ──
  function renderBrochure(p) {
    var gallery = parseJSON(p.gallery_images);
    var amenities = parseJSON(p.amenity_tags);
    var listingLinks = parseJSON(p.listing_links);
    // image_metadata is jsonb — Supabase returns it as a parsed object.
    var imgMeta = (p.image_metadata && typeof p.image_metadata === 'object' && !Array.isArray(p.image_metadata))
      ? p.image_metadata
      : (typeof p.image_metadata === 'string' ? (function(){ try { return JSON.parse(p.image_metadata) || {}; } catch(e) { return {}; } })() : {});
    var cfg = readBrochureConfig(p.brochure_config);

    // Apply photo_order if present. URLs not in the override list fall back
    // to their original gallery position (appended at the end). URLs in the
    // override that no longer exist in gallery are dropped.
    if (cfg.photoOrder) {
      var gallerySet = {};
      for (var go = 0; go < gallery.length; go++) gallerySet[gallery[go]] = true;
      var ordered = [];
      var seen = {};
      for (var po = 0; po < cfg.photoOrder.length; po++) {
        var u = cfg.photoOrder[po];
        if (gallerySet[u] && !seen[u]) { ordered.push(u); seen[u] = true; }
      }
      for (var go2 = 0; go2 < gallery.length; go2++) {
        if (!seen[gallery[go2]]) ordered.push(gallery[go2]);
      }
      gallery = ordered;
    }

    var html = '';

    // Section 1: HERO
    var heroImg = p.hero_image_url || (gallery.length ? gallery[0] : '');
    html += '<section class="br-hero">';
    if (heroImg) {
      html += '<img class="br-hero-img" src="' + esc(sizedImgUrl(heroImg, 1920)) + '" alt="' + esc(p.property_name) + '">';
    }
    html += '<div class="br-hero-overlay"></div>';
    html += '<div class="br-hero-content">';
    // Branded variant shows the company label above the property name; the
    // neutral (agent-share) variant keeps the hero clean so nothing on the
    // brochure leaks the company brand to the agent's client.
    // Hero brand mark stays as the gold "SOUTHERN ESCAPES" wordmark
    // above the property name. The logo image lives in the footer only.
    if (BRAND_MODE === 'direct') {
      html += '<div class="br-hero-brand">' +
        '<span class="br-hero-brand-script">Southern</span>' +
        '<span class="br-hero-brand-sans">Escapes</span>' +
        '</div>';
    }
    html += '<h1 class="br-hero-title">' + esc(p.property_name) + '</h1>';
    if (p.tagline) {
      html += '<div class="br-hero-tagline">' + esc(p.tagline) + '</div>';
    }
    html += '</div>';
    html += '</section>';

    // Section 2: KEY STATS
    var stats = [];
    if (p.bedrooms && p.bedrooms > 0) stats.push({ value: p.bedrooms, label: 'Bedrooms' });
    if (p.bathrooms && p.bathrooms > 0) stats.push({ value: p.bathrooms, label: 'Bathrooms' });
    if (p.sleeps && p.sleeps > 0) stats.push({ value: p.sleeps, label: 'Sleeps' });

    var locationParts = [];
    if (p.suburb) locationParts.push(p.suburb);
    if (p.city) locationParts.push(p.city);
    var locationStr = locationParts.join(', ');

    if (!cfg.hide('stats') && (stats.length > 0 || locationStr)) {
      html += '<section class="br-stats reveal">';
      if (stats.length > 0) {
        html += '<div class="br-stats-row">';
        for (var i = 0; i < stats.length; i++) {
          html += '<div class="br-stat-card">';
          html += '<div class="br-stat-value">' + esc(stats[i].value) + '</div>';
          html += '<div class="br-stat-label">' + esc(stats[i].label) + '</div>';
          html += '</div>';
        }
        html += '</div>';
      }
      if (locationStr) {
        html += '<div class="br-stats-location">' + esc(locationStr) + '</div>';
      }
      html += '</section>';
    }

    // Bed Sizes section
    var bedSizes = p.bed_sizes;
    if (typeof bedSizes === 'string') { try { bedSizes = JSON.parse(bedSizes); } catch(e) { bedSizes = []; } }
    if (!Array.isArray(bedSizes)) bedSizes = [];
    bedSizes = bedSizes.filter(function(b) { return b.room || b.bed; });

    if (!cfg.hide('beds') && bedSizes.length > 0) {
      html += '<section class="br-beds reveal">';
      html += '<h2 class="br-beds-heading">Sleeping Arrangements</h2>';
      html += '<div class="br-beds-rule"></div>';
      html += '<div class="br-beds-grid">';
      for (var bi = 0; bi < bedSizes.length; bi++) {
        var bed = bedSizes[bi];
        html += '<div class="br-bed-card">';
        html += '<div class="br-bed-icon">🛏</div>';
        html += '<div>';
        html += '<div class="br-bed-room">' + esc(bed.room || 'Bedroom ' + (bi + 1)) + '</div>';
        if (bed.bed) html += '<div class="br-bed-type">' + esc(bed.bed) + '</div>';
        html += '</div>';
        html += '</div>';
      }
      html += '</div>';
      html += '</section>';
    }

    // Section 3: ABOUT
    if (!cfg.hide('about') && p.description) {
      var descParagraphs = p.description.split(/\n\n|\n/).filter(function(s) { return s.trim(); });
      html += '<section class="br-about reveal">';
      html += '<h2 class="br-about-heading">About This Property</h2>';
      html += '<div class="br-about-rule"></div>';
      html += '<div class="br-about-text">';
      for (var j = 0; j < descParagraphs.length; j++) {
        html += '<p>' + esc(descParagraphs[j].trim()) + '</p>';
      }
      html += '</div>';
      html += '</section>';
    }

    // Section 4: GALLERY
    // The structured gallery_sections column (if present and non-empty) is
    // the canonical source — render photos grouped by section with section
    // names as subheadings. If the property still has only the legacy flat
    // gallery_images, fall back to a single ungrouped grid.
    var HARD_CAP = 30;
    var PREVIEW_CAP = 24;
    var isPreviewMode = /[?&]preview=1\b/.test(window.location.search);
    var cap = isPreviewMode ? PREVIEW_CAP : HARD_CAP;
    var galleryTruncated = false;

    // Parse gallery_sections defensively. Supabase returns jsonb as a parsed
    // object; the editor writes an array of { id, name, sort_order, photos }.
    var sections = p.gallery_sections;
    if (typeof sections === 'string') { try { sections = JSON.parse(sections); } catch(e) { sections = []; } }
    if (!Array.isArray(sections)) sections = [];

    // Build a flat list of visible non-hero photos, capped, grouped by section.
    // We render in section order (already sorted by the editor), and only
    // emit a section subheading when the section name isn't "Unsorted" — the
    // legacy backfill drops everything into Unsorted, and surfacing that
    // label adds noise rather than clarity.
    var grouped = []; // [{ name, photos: [{url, caption}] }]
    if (sections.length > 0) {
      var taken = 0;
      for (var si = 0; si < sections.length; si++) {
        var sec = sections[si] || {};
        var secPhotos = Array.isArray(sec.photos) ? sec.photos : [];
        var rendered = [];
        for (var spi = 0; spi < secPhotos.length; spi++) {
          var ph = secPhotos[spi];
          if (!ph || !ph.url) continue;
          if (ph.is_hero) continue;             // hero appears in br-hero, not the gallery
          if (ph.is_visible === false) continue; // explicitly hidden
          // Allow image_metadata-style override (legacy) just in case.
          var m = imageMeta(imgMeta, ph.url);
          if (!m.show) continue;
          if (taken >= cap) { galleryTruncated = true; break; }
          rendered.push({ url: ph.url, caption: ph.caption || m.caption || '' });
          taken++;
        }
        if (rendered.length > 0) {
          grouped.push({ name: (sec.name || '').trim(), photos: rendered });
        }
        if (taken >= cap) break;
      }
    } else {
      // Legacy fallback: flat gallery_images + image_metadata.
      var flat = [];
      for (var gi = 0; gi < gallery.length; gi++) {
        var gm = imageMeta(imgMeta, gallery[gi]);
        if (!gm.show) continue;
        if (flat.length >= cap) { galleryTruncated = true; break; }
        flat.push({ url: gallery[gi], caption: gm.caption });
      }
      if (flat.length > 0) grouped.push({ name: '', photos: flat });
    }

    // Decide whether to render section headings: only when there's >1 group
    // AND at least one group has a meaningful (non-"Unsorted") name.
    var showHeadings = grouped.length > 1 && grouped.some(function(g) {
      var n = (g.name || '').toLowerCase();
      return n && n !== 'unsorted';
    });

    if (!cfg.hide('gallery') && grouped.length > 0) {
      html += '<section class="br-gallery reveal">';
      html += '<h2 class="br-gallery-heading">Gallery</h2>';
      html += '<div class="br-gallery-rule"></div>';
      // Combine all photos into one queue for the chunked filler — section
      // boundaries are encoded by interleaving subheading items.
      var queue = [];
      for (var gx = 0; gx < grouped.length; gx++) {
        var g = grouped[gx];
        if (showHeadings && g.name && g.name.toLowerCase() !== 'unsorted') {
          queue.push({ heading: g.name });
        }
        for (var px = 0; px < g.photos.length; px++) {
          queue.push(g.photos[px]);
        }
      }
      window._brGalleryQueue = { items: queue, propertyName: p.property_name };
      html += '<div class="br-gallery-grid" id="br-gallery-grid"></div>';
      if (galleryTruncated && isPreviewMode) {
        html += '<div style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-light);font-style:italic">Preview shows first ' + cap + ' photos.</div>';
      }
      html += '</section>';
    } else {
      window._brGalleryQueue = null;
    }

    // Section 5: AMENITIES
    if (!cfg.hide('amenities') && amenities.length > 0) {
      html += '<section class="br-amenities reveal">';
      html += '<h2 class="br-amenities-heading">Amenities</h2>';
      html += '<div class="br-amenities-rule"></div>';
      html += '<ul class="br-amenities-list">';
      for (var m = 0; m < amenities.length; m++) {
        html += '<li class="br-amenity-item">' + esc(amenities[m]) + '</li>';
      }
      html += '</ul>';
      html += '</section>';
    }

    // Section 6: PRICING — removed (no pricing on brochures)

    // Section 7a: AGENT CONTACT — only on the neutral (agent-share) variant.
    // We swap a generic "speak to your agent" panel in for what will become
    // the branded "book direct" CTA on the company-domain variant. This keeps
    // the agent flow honest: the client sees nothing that would let them go
    // around the agent.
    if (BRAND_MODE === 'agent') {
      html += '<section class="br-agent-contact reveal">';
      html += '<h2 class="br-agent-contact-heading">Interested in this property?</h2>';
      html += '<div class="br-agent-contact-body">Speak to your agent for availability, pricing and booking.</div>';
      html += '</section>';
    } else {
      // Branded "Book Direct" panel — only appears on the company domain.
      // The contact email is the admin who shared the brochure, resolved
      // from `?s=<handle>` via the admin_handles table (set on
      // window._brSharerEmail by main() before render). Falls back to a
      // generic inbox when the link was opened without a handle or the
      // handle didn't resolve.
      var sharerEmail = window._brSharerEmail || 'info@southernescapes.co.za';
      html += '<section class="br-agent-contact reveal">';
      html += '<h2 class="br-agent-contact-heading">Book Direct with Southern Escapes</h2>';
      html += '<div class="br-agent-contact-body" style="margin-bottom:16px">Speak to our team for availability, pricing and to secure your booking.</div>';
      html += '<div class="br-contact-links">';
      html += '<a href="mailto:' + esc(sharerEmail) + '" class="br-contact-btn">' + esc(sharerEmail) + '</a>';
      html += '</div>';
      html += '</section>';
    }

    // Section 7: SHARE
    // Hide the share section in agent mode so the recipient doesn't get a
    // re-share button — the agent is the one doing the sharing.
    if (!cfg.hide('share') && BRAND_MODE !== 'agent') {
      html += '<section class="br-share reveal">';
      html += '<h2 class="br-share-heading">Share This Property</h2>';
      html += '<button class="br-btn-primary" id="btn-copy-link">Copy Link</button>';
      html += '<div class="br-share-sub">Share this brochure with anyone interested</div>';
      html += '</section>';
    }

    // Section 8: FOOTER — branded on the company domain, neutral elsewhere
    html += '<footer class="br-footer">';
    if (BRAND_MODE === 'direct') {
      html += '<img class="br-footer-logo" src="/brochure-assets/se-logo.png" alt="Southern Escapes">';
      html += '<div class="br-footer-copy">&copy; ' + new Date().getFullYear() + ' Southern Escapes. All rights reserved.</div>';
    } else {
      html += '<div class="br-footer-copy">&copy; ' + new Date().getFullYear() + ' All rights reserved.</div>';
    }
    html += '</footer>';

    return html;
  }

  // ── Main ──
  (function main() {
    var params = new URLSearchParams(window.location.search);
    // Accept either ?id=<uuid> (legacy / canonical) or ?slug=<slug>. The slug
    // form is what /brochures/<slug> rewrites to via vercel.json, so the
    // shareable URL doesn't expose .html.
    var id = params.get('id');
    var slug = params.get('slug');

    // Vercel rewrites only change what file is served — the browser URL keeps
    // its original /brochures/<slug> form, so window.location.search is empty
    // even though we rewrote to /brochure.html?slug=…. Fall back to parsing
    // the pathname directly.
    if (!id && !slug) {
      var pathMatch = window.location.pathname.match(/^\/brochures\/([^/?#]+)/);
      if (pathMatch) slug = decodeURIComponent(pathMatch[1]);
    }

    if (!id && !slug) {
      showError('Missing Property ID', 'No property ID was provided. Please check the link and try again.');
      return;
    }

    var lookup = id
      ? 'id=eq.' + encodeURIComponent(id)
      : 'slug=eq.' + encodeURIComponent(slug);
    var url = SUPABASE_URL + '/rest/v1/partner_properties?' + lookup + '&select=*&limit=1';

    // Optional sharer handle (?s=jh) → look up the admin's email in parallel
    // with the property fetch. Renderer reads window._brSharerEmail.
    var handle = params.get('s');
    var sharerPromise = Promise.resolve(null);
    if (handle && /^[a-z0-9]{2,8}$/i.test(handle)) {
      var handleUrl = SUPABASE_URL + '/rest/v1/admin_handles?handle=eq.' +
        encodeURIComponent(handle.toLowerCase()) + '&select=email&limit=1';
      sharerPromise = fetch(handleUrl, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      })
        .then(function(r) { return r.ok ? r.json() : []; })
        .then(function(rows) {
          var em = rows && rows[0] && rows[0].email;
          if (em) window._brSharerEmail = em;
          return em || null;
        })
        .catch(function() { return null; });
    }

    Promise.all([
      fetch(url, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY
        }
      })
      .then(function(res) {
        if (!res.ok) throw new Error('Failed to load property data');
        return res.json();
      }),
      sharerPromise
    ])
    .then(function(results) {
      var data = results[0];
      if (!data || data.length === 0) {
        showError('Property Not Found', 'The requested property could not be found. It may have been removed or the link may be incorrect.');
        return;
      }

      var p = data[0];
      window._brProperty = p; // referenced by the preview-mode postMessage handler below

      // Set page title
      document.title = (p.property_name || 'Property Brochure');

      // Render brochure. Wrap in try/catch so any rendering exception lands
      // in a visible error block rather than leaving the canvas blank.
      var canvas = el('canvas');
      try {
        canvas.innerHTML = renderBrochure(p);
        fillGalleryChunked();
      } catch (renderErr) {
        console.error('[brochure] initial render failed:', renderErr);
        canvas.innerHTML =
          '<div style="padding:40px;font-family:sans-serif;color:#991B1B;background:#FEE2E2;border:1px solid #FCA5A5;border-radius:8px;margin:40px auto;max-width:800px">' +
          '<strong>Render failed:</strong><br><pre style="white-space:pre-wrap;margin-top:8px;font-size:13px">' +
          esc(String(renderErr && renderErr.stack || renderErr)) +
          '</pre></div>';
      }
      canvas.style.display = 'block';

      // Hide loading
      el('loading-screen').style.display = 'none';

      // Init reveal animations
      initReveal();

      // Preview mode: parent (BrochureEditor) sends draft configs via postMessage
      // so the iframe re-renders live as the user edits, without re-fetching.
      var isPreview = /[?&]preview=1\b/.test(window.location.search);
      if (isPreview) {
        window.addEventListener('message', function(evt) {
          var msg = evt.data;
          if (!msg || msg.type !== 'preview-config' || !window._brProperty) return;
          // Overlay the draft config (config / image_metadata / hero /
          // gallery) onto the cached property data and re-render in place.
          var overlay = { brochure_config: msg.config || {} };
          if (msg.image_metadata && typeof msg.image_metadata === 'object') {
            overlay.image_metadata = msg.image_metadata;
          }
          if (typeof msg.hero_image_url === 'string' || msg.hero_image_url === null) {
            overlay.hero_image_url = msg.hero_image_url;
          }
          if (Array.isArray(msg.gallery_images)) {
            overlay.gallery_images = msg.gallery_images;
          }
          var draft = Object.assign({}, window._brProperty, overlay);
          try {
            canvas.innerHTML = renderBrochure(draft);
            fillGalleryChunked();
          } catch (renderErr) {
            console.error('[brochure] preview render failed:', renderErr);
            canvas.innerHTML =
              '<div style="padding:40px;font-family:sans-serif;color:#991B1B;background:#FEE2E2;border:1px solid #FCA5A5;border-radius:8px;margin:40px auto;max-width:800px">' +
              '<strong>Preview render failed:</strong><br><pre style="white-space:pre-wrap;margin-top:8px;font-size:13px">' +
              esc(String(renderErr && renderErr.stack || renderErr)) +
              '</pre></div>';
          }
          initReveal();
          // Re-wire copy-link button since it gets re-mounted by innerHTML.
          var copyBtn2 = el('btn-copy-link');
          if (copyBtn2) copyBtn2.addEventListener('click', function() {
            navigator.clipboard.writeText(window.location.href).catch(function() {});
          });
        });
        // Tell the parent we're ready to receive previews.
        try { window.parent.postMessage({ type: 'preview-ready' }, '*'); } catch(e) {}
      }

      // Copy link button
      var copyBtn = el('btn-copy-link');
      if (copyBtn) {
        copyBtn.addEventListener('click', function() {
          navigator.clipboard.writeText(window.location.href).then(function() {
            showToast('Link copied to clipboard');
          }).catch(function() {
            // Fallback for older browsers
            var ta = document.createElement('textarea');
            ta.value = window.location.href;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try {
              document.execCommand('copy');
              showToast('Link copied to clipboard');
            } catch(e) {
              showToast('Could not copy link');
            }
            document.body.removeChild(ta);
          });
        });
      }
    })
    .catch(function(err) {
      showError('Something Went Wrong', 'We could not load the property brochure. Please try again later.');
    });
  })();

})();
</script>
</body>
</html>
